name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: stable
      - run: bun install
      - run: bun run tsc --noEmit
      - run: bun run lint
      - run: bun run db:setup
      - run: bun run vite build
